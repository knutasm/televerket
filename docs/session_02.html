<h2 id="hva-er-en-source-i-dbt">Hva er en source i dbt?</h2>
<p>En <strong>source</strong> er en tabell som dbt ikke eier — den er lastet inn av et annet system.</p>
<p>Ved å registrere kilder i dbt får du:</p>
<ul>
<li>Mulighet til å referere til dem med <code>{{ source() }}</code> i stedet for hardkodede tabellnavn</li>
<li>Automatisk linjeavstamning fra kilde til mart</li>
<li>Freshness-sjekker som varsler når data er for gammelt</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># models/sources.yml (filnavn. Et hvilket som helst gyldig finavn er ok)</span>

    <span class="hljs-attr">schema:</span> <span class="hljs-string">raw</span> <span class="hljs-comment"># &lt;- Schema for kilden. Valgfritt; hvis ikke oppgitt brukes name</span>
    <span class="hljs-attr">tables:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">crm_customers</span> <span class="hljs-comment"># &lt;- navnet på tabellen i kilden</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">crm_contracts</span>
</code></pre>

<h2 id="source--i-en-modell"><code>{{ source() }}</code> i en modell</h2>
<p>I stedet for å skrive <code>raw.crm_customers</code> direkte i SQL bruker du:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">select</span> <span class="hljs-operator">*</span>

<h2 id="freshness">Freshness</h2>
<p>dbt kan sjekke hvor ferske kildedataene er ved å lese en tidsserie-kolonne.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">sources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">crm</span>
    <span class="hljs-attr">schema:</span> <span class="hljs-string">raw</span>
    <span class="hljs-attr">loaded_at_field:</span> <span class="hljs-string">_loaded_at</span> <span class="hljs-comment"># &lt;- Hvilken kolonne som brukes til å angi rekkefølge</span>
    <span class="hljs-attr">freshness:</span>
      <span class="hljs-attr">warn_after:</span> {<span class="hljs-attr">count:</span> <span class="hljs-number">24</span>, <span class="hljs-attr">period:</span> <span class="hljs-string">hour</span>}
      <span class="hljs-attr">error_after:</span> {<span class="hljs-attr">count:</span> <span class="hljs-number">48</span>, <span class="hljs-attr">period:</span> <span class="hljs-string">hour</span>}
    <span class="hljs-attr">tables:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">crm_customers</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">crm_contracts</span>
        <span class="hljs-attr">freshness:</span>
          <span class="hljs-attr">warn_after:</span> {<span class="hljs-attr">count:</span> <span class="hljs-number">6</span>, <span class="hljs-attr">period:</span> <span class="hljs-string">hour</span>}   <span class="hljs-comment"># override per tabell</span>
</code></pre>
<p>Kjøres med:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">dbt <span class="hljs-built_in">source</span> freshness
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="freshness--hva-betyr-terskelverdiene">Freshness — hva betyr terskelverdiene?</h2>
<p><code>warn_after</code> og <code>error_after</code> definerer hvor gammelt det nyeste innlastede datapunktet kan være.</p>
<ul>
<li><strong>warn</strong>: dbt rapporterer en advarsel, jobben fortsetter</li>
<li><strong>error</strong>: dbt feiler — nyttig i en pipeline der downstream-kjøring ikke gir mening på foreldet data</li>
</ul>
<p>Til diskusjon</p>
<ul>
<li>Hva er et realistisk freshness-SLA for hvert kildesystem?</li>
<li>Bør CRM og billing ha samme terskel?</li>
<li>Hva skjer i helger og helligdager?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-er-et-seed">Hva er et seed?</h2>
<p>Et <strong>seed</strong> er en CSV-fil som dbt laster inn som en tabell i databasen.</p>
<p>Passer for små, stabile referansedata som ikke finnes i noe kildesystem — for eksempel en mapping-tabell eller en produktkatalog.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>dbt-project/
└── seeds/
    └── catalog_products.csv
</code></pre>
<p>Lastes inn med:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">dbt seed
</code></pre>
<p>Deretter kan andre modeller referere til den med <code>{{ ref('catalog_products') }}</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="seeds-i-yaml">Seeds i YAML</h2>
<p>Seeds kan beskrives og konfigureres i YAML på samme måte som modeller.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># seeds/_seeds.yml</span>
<span class="hljs-attr">seeds:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">catalog_products</span>
    <span class="hljs-attr">description:</span> <span class="hljs-string">&gt;
      Produktkatalog med alle abonnementstyper selskapet tilbyr.
      Inneholder historiske produktversjoner med valid_from / valid_to.
</span>    <span class="hljs-attr">columns:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">product_code</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">Unik</span> <span class="hljs-string">produktkode.</span> <span class="hljs-string">Kan</span> <span class="hljs-string">gjenbrukes</span> <span class="hljs-string">på</span> <span class="hljs-string">tvers</span> <span class="hljs-string">av</span> <span class="hljs-string">versjoner.</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">valid_to</span>
        <span class="hljs-attr">description:</span> <span class="hljs-literal">Null</span> <span class="hljs-string">for</span> <span class="hljs-string">gjeldende</span> <span class="hljs-string">produkter.</span> <span class="hljs-string">Satt</span> <span class="hljs-string">for</span> <span class="hljs-string">utgåtte</span> <span class="hljs-string">versjoner.</span>
</code></pre>
<p>Du kan også overstyre kolonnetyper direkte i YAML:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml">    <span class="hljs-attr">config:</span>
      <span class="hljs-attr">column_types:</span>
        <span class="hljs-attr">monthly_fee_eur:</span> <span class="hljs-string">float64</span>
        <span class="hljs-attr">valid_from:</span> <span class="hljs-string">date</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="kilder">Kilder</h2>
<p>Vi har data fra fire kildesystemer, alle i BigQuery-datasettet <code>raw</code>:</p>
<table>
<thead>
<tr>
<th>System</th>
<th>Tabeller</th>
</tr>
</thead>
<tbody>
<tr>
<td>CRM</td>
<td><code>crm_customers</code>, <code>crm_contracts</code></td>
</tr>
<tr>
<td>Fakturering</td>
<td><code>billing_invoices</code>, <code>billing_payments</code></td>
</tr>
<tr>
<td>Nettverk</td>
<td><code>network_service_activations</code>, <code>network_incidents</code></td>
</tr>
<tr>
<td>Produktkatalog</td>
<td><code>catalog_products</code></td>
</tr>
</tbody>
</table>
<p>I dette blokket registrerer vi kildene og gjør oss kjent med dataene.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h1 id="blokk-2">Blokk 2</h1>
<h2 id="staging-modeller-og-materialisering">Staging-modeller og materialisering</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-er-en-staging-modell">Hva er en staging-modell?</h2>
<p>En staging-modell er en <strong>1-til-1-representasjon av én kildetabell</strong> — renset, men ikke tolket.</p>
<p>Det er det eneste stedet i prosjektet der vi:</p>
<ul>
<li>Gir kolonner konsistente navn</li>
<li>Caster datatyper til riktige typer</li>
<li>Løser opp kildesystemets tekniske særegenheter</li>
</ul>
<p>Staging-modeller inneholder <strong>ingen forretningslogikk</strong> og <strong>ingen joins</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>stg_crm__customers.sql   ← én modell per kildetabell
stg_crm__contracts.sql
stg_billing__invoices.sql
stg_billing__payments.sql
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-h%C3%B8rer-hjemme-i-staging">Hva hører hjemme i staging?</h2>
<table>
<thead>
<tr>
<th>Hører hjemme</th>
<th>Hører ikke hjemme</th>
</tr>
</thead>
<tbody>
<tr>
<td>Kolonnenavn → standard navn</td>
<td>Joins mellom tabeller</td>
</tr>
<tr>
<td><code>VARCHAR</code> → <code>DATE</code>, <code>NUMERIC</code></td>
<td>Beregninger på tvers av rader</td>
</tr>
<tr>
<td>JSON-utpakking (enkle, flate felt)</td>
<td>Forretningsregler og flagg</td>
</tr>
<tr>
<td>Filtrering av tekniske metadata-rader</td>
<td>Aggregering</td>
</tr>
<tr>
<td><code>COALESCE</code> for enkle standardverdier</td>
<td>Historisering / SCD-logikk</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="navngiving-i-staging">Navngiving i staging</h2>
<p>Standardiser kolonnenavn på tvers av alle staging-modeller:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">select</span>
    <span class="hljs-comment">-- rename: fjern kildesystemets særegenheter</span>
    custID              <span class="hljs-keyword">as</span> customer_id,
    full_name           <span class="hljs-keyword">as</span> customer_name,

    <span class="hljs-comment">-- cast: gi kolonnen riktig type</span>
    <span class="hljs-built_in">cast</span>(created_at <span class="hljs-keyword">as</span> <span class="hljs-type">date</span>)                        <span class="hljs-keyword">as</span> created_date,
    safe_cast(monthly_fee <span class="hljs-keyword">as</span> <span class="hljs-type">numeric</span>)               <span class="hljs-keyword">as</span> monthly_fee_eur,
    parse_date(<span class="hljs-string">&#x27;%Y%m%d&#x27;</span>, invoice_date)              <span class="hljs-keyword">as</span> invoice_date,

    <span class="hljs-comment">-- beholdes som de er</span>
    email,
    phone,
    status

<span class="hljs-keyword">from</span> {{ source(<span class="hljs-string">&#x27;crm&#x27;</span>, <span class="hljs-string">&#x27;crm_customers&#x27;</span>) }}
</code></pre>
<p><code>safe_cast</code> i BigQuery returnerer <code>null</code> i stedet for å feile ved ugyldige verdier — nyttig under utforsking.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-er-materialisering">Hva er materialisering?</h2>
<p>Materialisering bestemmer <strong>hvordan dbt skriver modellen til databasen</strong>.</p>
<table>
<thead>
<tr>
<th>Type</th>
<th>Hva dbt gjør</th>
<th>Typisk bruk</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>view</code></td>
<td>Oppretter en view — ingen data lagres</td>
<td>Staging, enkle transformasjoner</td>
</tr>
<tr>
<td><code>table</code></td>
<td>Materialiserer hele resultatet som en tabell</td>
<td>Tunge intermediate-modeller</td>
</tr>
<tr>
<td><code>incremental</code></td>
<td>Legger til / oppdaterer kun nye rader</td>
<td>Store faktatabeller, events</td>
</tr>
<tr>
<td><code>ephemeral</code></td>
<td>Kompileres inn som en CTE — finnes ikke i DB</td>
<td>Gjenbrukbare mellomsteg</td>
</tr>
</tbody>
</table>
<p>Staging-modeller er nesten alltid <code>view</code> — de er tynne og brukes som grunnlag for neste lag, ikke som sluttpunkt.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="materialisering-i-yaml-konfigurasjon">Materialisering i YAML-konfigurasjon</h2>
<p>Materialisering settes i YAML — ikke i SQL-filen.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># models/staging/_staging.yml</span>
<span class="hljs-attr">models:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">stg_crm__customers</span>
    <span class="hljs-attr">config:</span>
      <span class="hljs-attr">materialized:</span> <span class="hljs-string">view</span>
</code></pre>
<p>Eller på mappenivå i <code>dbt_project.yml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">models:</span>
  <span class="hljs-attr">mitt_prosjekt:</span>
    <span class="hljs-attr">staging:</span>
      <span class="hljs-string">+materialized:</span> <span class="hljs-string">view</span>     <span class="hljs-comment"># gjelder alle modeller i staging/</span>
    <span class="hljs-attr">intermediate:</span>
      <span class="hljs-string">+materialized:</span> <span class="hljs-string">table</span>
    <span class="hljs-attr">marts:</span>
      <span class="hljs-string">+materialized:</span> <span class="hljs-string">table</span>
</code></pre>
<p><code>+</code> foran en nøkkel betyr at den arves nedover i mappestrukturen.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="view-vs-table">View vs. table</h2>
<p>En <code>view</code> beregnes på nytt hver gang den spørres. Det er greit når:</p>
<ul>
<li>Modellen er rask å kjøre</li>
<li>Den brukes sjelden eller av andre modeller, ikke sluttbrukere</li>
<li>Du vil alltid se ferske data</li>
</ul>
<p>Bytt til <code>table</code> når:</p>
<ul>
<li>Modellen tar lang tid å kjøre og refereres ofte</li>
<li>Downstream-modeller bygger på den og du vil ikke gjøre jobben om igjen</li>
<li>Sluttbrukere spør direkte mot modellen</li>
</ul>
<blockquote>
<p>Staging er nesten alltid <code>view</code>. Intermediate og mart er ofte <code>table</code>. Start med <code>view</code> og bytt når du har grunn til det.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="datasett-staging">Datasett: staging</h2>
<p>Vi skal bygge én staging-modell per kildetabell:</p>
<table>
<thead>
<tr>
<th>Staging-modell</th>
<th>Kilde</th>
<th>Hva som må fikses</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>stg_crm__customers</code></td>
<td><code>crm_customers</code></td>
<td><code>custID</code> → rename, JSON-felt, <code>created_at</code> cast</td>
</tr>
<tr>
<td><code>stg_crm__contracts</code></td>
<td><code>crm_contracts</code></td>
<td><code>monthly_fee</code> VARCHAR → NUMERIC</td>
</tr>
<tr>
<td><code>stg_billing__invoices</code></td>
<td><code>billing_invoices</code></td>
<td><code>InvoiceID</code> → rename, YYYYMMDD → DATE, <code>amount_eur</code> → NUMERIC</td>
</tr>
<tr>
<td><code>stg_billing__payments</code></td>
<td><code>billing_payments</code></td>
<td>Ryddig — minimalt å gjøre</td>
</tr>
<tr>
<td><code>stg_network__service_activations</code></td>
<td><code>network_service_activations</code></td>
<td>JSON <code>device_info</code> — diskusjon: her eller intermediate?</td>
</tr>
<tr>
<td><code>stg_network__incidents</code></td>
<td><code>network_incidents</code></td>
<td><code>customer_ref</code> — behold navn eller rename?</td>
</tr>
<tr>
<td><code>stg_catalog__products</code></td>
<td><code>catalog_products</code></td>
<td>Ryddig — seed, bruker <code>ref()</code> ikke <code>source()</code></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h1 id="blokk-3">Blokk 3</h1>
<h2 id="intermediate-modeller">Intermediate-modeller</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-er-et-intermediate-lag">Hva er et intermediate-lag?</h2>
<p>Intermediate-modeller kombinerer og beriker staging-modeller. De forbereder entiteter for konsumpsjon — uten å ta stilling til hvem som konsumerer dem.</p>
<p>Typisk innhold:</p>
<ul>
<li>Joins mellom staging-modeller fra ulike kildesystemer</li>
<li>Utpakking av JSON-felt som er for komplekse for staging</li>
<li>Deduplisering av rader fra kilden</li>
<li>Tekniske avledninger som gjelder entiteten generelt (f.eks. er kontrakten aktiv?)</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>int_customers__enriched.sql       ← CRM + kontrakter
int_customers__activations.sql
int_invoices__with_payments.sql
</code></pre>
<blockquote>
<p>Navnekonvensjonen <code>int_&lt;entitet&gt;__&lt;beskrivelse&gt;</code> grupperer modeller etter entitet, ikke etter kilde.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="staging-vs-intermediate-vs-mart">Staging vs. intermediate vs. mart</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>stg_crm__customers          stg_crm__contracts
        │                           │
        └──────────┬────────────────┘
                   ▼
        int_customers__enriched
                   │
                   ▼
        mart_customer_360
</code></pre>
<p>En <strong>staging</strong>-modell: <em>hva finnes i denne kildetabellen?</em></p>
<p>En <strong>intermediate</strong>-modell: <em>hva vet vi om denne entiteten — uavhengig av hvem som spør?</em></p>
<p>En <strong>mart</strong>-modell: <em>hva trenger dette spesifikke bruksområdet?</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-skiller-intermediate-fra-mart">Hva skiller intermediate fra mart?</h2>
<p><strong>Intermediate</strong> inneholder logikk som er <strong>universell for entiteten</strong>:</p>
<ul>
<li>En kunde har én aktiv kontrakt (ikke konsumentspesifikt — det er alltid sant)</li>
<li>En betaling er en duplikat hvis samme faktura er betalt to ganger (alltid sant)</li>
<li>Kontraktsvarighet i dager (en egenskap ved kontrakten, ikke ved rapporten)</li>
</ul>
<p><strong>Mart</strong> inneholder logikk som er <strong>spesifikk for konsumenten</strong>:</p>
<ul>
<li>Livstidsverdi i euro (KPI for churn-teamet)</li>
<li>Antall hendelser siste 90 dager (metrikk for nettverksdashboard)</li>
<li><code>is_at_risk</code>-flagg basert på betalingshistorikk (forretningsregel for én rapport)</li>
</ul>
<blockquote>
<p>Det vanlige rådet er at «forretningslogikk hører hjemme i mart». Det stemmer for <strong>konsumentspesifikk</strong> logikk. Intermediate håndterer logikk som ville blitt duplisert på tvers av mange marts hvis den ikke ble løftet opp.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="json-utpakking--staging-eller-intermediate">JSON-utpakking — staging eller intermediate?</h2>
<p>Dette er et designvalg, ikke et fasitsvar. To hensyn styrer beslutningen:</p>
<p><strong>Pakk ut i staging når:</strong></p>
<ul>
<li>JSON-feltet er flatt og enkelt</li>
<li>Feltene brukes direkte som kolonner uten videre transformasjon</li>
<li>Utpakkingen ikke avhenger av andre modeller</li>
<li>Eksempel: <code>address</code> i <code>crm_customers</code></li>
</ul>
<p><strong>Pakk ut i intermediate når:</strong></p>
<ul>
<li>JSON-feltet er komplekst eller delvis null</li>
<li>De utpakkede feltene må kombineres med data fra andre modeller for å gi mening</li>
<li>Utpakket innhold er bare relevant i en spesifikk kontekst</li>
<li>Eksempel: <code>preferences</code> og <code>device_info</code> — meningsfull først når vi vet hvem kunden er</li>
</ul>
<blockquote>
<p>Staging handler om kilden. Intermediate handler om entiteten.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="json-utpakking-i-bigquery">JSON-utpakking i BigQuery</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Flat utpakking med json_value()</span>
<span class="hljs-built_in">json_value</span>(preferences, <span class="hljs-string">&#x27;$.language&#x27;</span>)        <span class="hljs-keyword">as</span> preferred_language,
<span class="hljs-built_in">json_value</span>(preferences, <span class="hljs-string">&#x27;$.paperless&#x27;</span>)       <span class="hljs-keyword">as</span> paperless_billing,
<span class="hljs-built_in">json_value</span>(preferences, <span class="hljs-string">&#x27;$.marketing_opt_in&#x27;</span>) <span class="hljs-keyword">as</span> marketing_opt_in,

<span class="hljs-comment">-- Nested — device_info fra network_service_activations</span>
<span class="hljs-built_in">json_value</span>(device_info, <span class="hljs-string">&#x27;$.make&#x27;</span>)            <span class="hljs-keyword">as</span> device_make,
<span class="hljs-built_in">json_value</span>(device_info, <span class="hljs-string">&#x27;$.model&#x27;</span>)           <span class="hljs-keyword">as</span> device_model,
<span class="hljs-built_in">json_value</span>(device_info, <span class="hljs-string">&#x27;$.os&#x27;</span>)              <span class="hljs-keyword">as</span> device_os,
<span class="hljs-built_in">json_value</span>(device_info, <span class="hljs-string">&#x27;$.imei&#x27;</span>)            <span class="hljs-keyword">as</span> device_imei,
</code></pre>
<p><code>json_value()</code> returnerer alltid <code>STRING</code>. Cast eksplisitt hvis du trenger en annen type:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-built_in">cast</span>(<span class="hljs-built_in">json_value</span>(preferences, <span class="hljs-string">&#x27;$.paperless&#x27;</span>) <span class="hljs-keyword">as</span> bool) <span class="hljs-keyword">as</span> paperless_billing
</code></pre>
<p>Tomme JSON-objekter <code>{}</code> gir <code>null</code> på alle <code>json_value()</code>-kall — håndter dette med <code>COALESCE</code> eller en test.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="tags-i-yaml">Tags i YAML</h2>
<p>Tags lar deg gruppere modeller på tvers av mapper — nyttig for selektiv kjøring og dokumentasjon.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">models:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">int_customers__enriched</span>
    <span class="hljs-attr">config:</span>
      <span class="hljs-attr">materialized:</span> <span class="hljs-string">table</span>
      <span class="hljs-attr">tags:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-string">customer</span>
        <span class="hljs-bullet">-</span> <span class="hljs-string">daily</span>
    <span class="hljs-attr">columns:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">Unik</span> <span class="hljs-string">kundeidentifikator.</span> <span class="hljs-string">Primærnøkkel.</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">preferred_language</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">Foretrukket</span> <span class="hljs-string">språk</span> <span class="hljs-string">fra</span> <span class="hljs-string">kundens</span> <span class="hljs-string">preferanseprofil.</span> <span class="hljs-literal">Null</span> <span class="hljs-string">hvis</span> <span class="hljs-string">ikke</span> <span class="hljs-string">satt.</span>
</code></pre>
<p>Bruk tags til å kjøre et utvalg:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">dbt run --<span class="hljs-keyword">select</span> tag:customer
dbt build --<span class="hljs-keyword">select</span> tag:daily
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="kolonneniv%C3%A5-beskrivelser-i-yaml">Kolonnenivå-beskrivelser i YAML</h2>
<p>Beskrivelser på kolonnenivå fyller dokumentasjonssiden med innhold.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">models:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">int_customers__enriched</span>
    <span class="hljs-attr">description:</span> <span class="hljs-string">&gt;
      Én rad per kunde, beriket med aktiv kontraktinformasjon og
      utpakkede preferanser fra CRM.
</span>    <span class="hljs-attr">columns:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">Primærnøkkel.</span> <span class="hljs-string">Arvet</span> <span class="hljs-string">fra</span> <span class="hljs-string">stg_crm__customers.</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">contract_status</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">&gt;
          Status på kundens siste aktive kontrakt.
          Null for kunder uten noen kontrakt (f.eks. status pending).
</span>      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">monthly_fee_eur</span>
        <span class="hljs-attr">description:</span> <span class="hljs-string">Månedlig</span> <span class="hljs-string">totalbeløp</span> <span class="hljs-string">på</span> <span class="hljs-string">tvers</span> <span class="hljs-string">av</span> <span class="hljs-string">alle</span> <span class="hljs-string">aktive</span> <span class="hljs-string">kontrakter.</span>
</code></pre>
<blockquote>
<p>Skriv beskrivelsen slik at en ny kollega forstår kolonnen uten å se SQL-en.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="deduplisering">Deduplisering</h2>
<p><code>billing_payments</code> inneholder dupliserte betalingsrader — samme faktura betalt to ganger i systemet.</p>
<p>En vanlig tilnærming med <code>ROW_NUMBER()</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">with</span> payments_deduped <span class="hljs-keyword">as</span> (
    <span class="hljs-keyword">select</span>
        <span class="hljs-operator">*</span>,
        <span class="hljs-built_in">row_number</span>() <span class="hljs-keyword">over</span> (
            <span class="hljs-keyword">partition</span> <span class="hljs-keyword">by</span> invoice_ref
            <span class="hljs-keyword">order</span> <span class="hljs-keyword">by</span> paid_on
        ) <span class="hljs-keyword">as</span> rn
    <span class="hljs-keyword">from</span> {{ <span class="hljs-keyword">ref</span>(<span class="hljs-string">&#x27;stg_billing__payments&#x27;</span>) }}
)

<span class="hljs-keyword">select</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">from</span> payments_deduped
<span class="hljs-keyword">where</span> rn <span class="hljs-operator">=</span> <span class="hljs-number">1</span>
</code></pre>
<p>Spørsmål å tenke på:</p>
<ul>
<li>Hvilken rad beholder du — den første eller siste?</li>
<li>Bør du filtrere i intermediate, eller eksponere <code>rn</code> til mart-laget?</li>
<li>Burde det også finnes en <strong>test</strong> som fanger dette problemet?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="datasett-intermediate">Datasett: intermediate</h2>
<p>Modellene vi skal bygge i denne blokken:</p>
<table>
<thead>
<tr>
<th>Intermediate-modell</th>
<th>Hva den gjør</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>int_customers__enriched</code></td>
<td>Kobler <code>stg_crm__customers</code> med siste aktive kontrakt, pakker ut <code>preferences</code></td>
</tr>
<tr>
<td><code>int_customers__activations</code></td>
<td>Kobler kunder med siste nettverksaktivering og pakker ut <code>device_info</code></td>
</tr>
<tr>
<td><code>int_billing__invoice_settlement</code></td>
<td>Fakturaer beriket med betalingsstatus — faktura er primærentiteten, betaling er et oppslag</td>
</tr>
<tr>
<td><code>int_network__incidents_enriched</code></td>
<td>Kobler hendelser med kundeinformasjon</td>
</tr>
</tbody>
</table>
<blockquote>
<p><code>crm_contracts</code> og <code>catalog_products</code> inneholder allerede historikk med <code>valid_from</code> / <code>valid_to</code> fra kildesystemet — staging eksponerer det som det er.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h1 id="blokk-4">Blokk 4</h1>
<h2 id="testing">Testing</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="hva-er-en-dbt-test">Hva er en dbt-test?</h2>
<p>En <strong>test</strong> i dbt er en sjekk som kjøres mot data i databasen og feiler hvis én eller flere rader ikke oppfyller kravet.</p>
<p>Tester kjøres med:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">dbt <span class="hljs-built_in">test</span>
dbt <span class="hljs-built_in">test</span> --<span class="hljs-keyword">select</span> stg__crm_customers   <span class="hljs-comment"># ett modell</span>
dbt <span class="hljs-built_in">test</span> --<span class="hljs-keyword">select</span> tag:customer         <span class="hljs-comment"># alle med tag</span>
</code></pre>
<p>dbt skiller mellom to typer:</p>
<table>
<thead>
<tr>
<th>Type</th>
<th>Beskrivelse</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Generiske</strong></td>
<td>Makroer som konfigureres i YAML — gjenbrukbare</td>
</tr>
<tr>
<td><strong>Singulære</strong></td>
<td>SQL-filer i <code>data-tests/</code> — returnerer rader som feiler</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="innebygde-generiske-tester">Innebygde generiske tester</h2>
<p>dbt har fire innebygde tester som dekker de vanligste behovene:</p>
<table>
<thead>
<tr>
<th>Test</th>
<th>Sjekker</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>unique</code></td>
<td>Ingen duplikater i kolonnen</td>
</tr>
<tr>
<td><code>not_null</code></td>
<td>Ingen null-verdier</td>
</tr>
<tr>
<td><code>accepted_values</code></td>
<td>Kun verdier fra en definert liste</td>
</tr>
<tr>
<td><code>relationships</code></td>
<td>Fremmednøkkel finnes i en annen modell</td>
</tr>
</tbody>
</table>
<p>De konfigureres direkte i YAML — ingen SQL nødvendig.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="tester-i-yaml">Tester i YAML</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">models:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">stg__crm_customers</span>
    <span class="hljs-attr">columns:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
        <span class="hljs-attr">tests:</span>
          <span class="hljs-bullet">-</span> <span class="hljs-string">unique</span>
          <span class="hljs-bullet">-</span> <span class="hljs-string">not_null</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">status</span>
        <span class="hljs-attr">tests:</span>
          <span class="hljs-bullet">-</span> <span class="hljs-attr">accepted_values:</span>
              <span class="hljs-attr">values:</span> [<span class="hljs-string">&#x27;active&#x27;</span>, <span class="hljs-string">&#x27;suspended&#x27;</span>, <span class="hljs-string">&#x27;terminated&#x27;</span>]
      <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">contract_id</span>
        <span class="hljs-attr">tests:</span>
          <span class="hljs-bullet">-</span> <span class="hljs-attr">relationships:</span>
              <span class="hljs-attr">to:</span> <span class="hljs-string">ref(&#x27;stg__crm_contracts&#x27;)</span>
              <span class="hljs-attr">field:</span> <span class="hljs-string">contract_id</span>
</code></pre>
<p>Alle fire innebygde tester brukes i dette prosjektet — se <code>_staging.yml</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="alvorlighetsgrad-warn-vs-error">Alvorlighetsgrad: <code>warn</code> vs. <code>error</code></h2>
<p>Ikke alle testfeil er like kritiske. dbt lar deg styre hva som skjer når en test feiler:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">columns:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">email</span>
    <span class="hljs-attr">tests:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">not_null:</span>
          <span class="hljs-attr">severity:</span> <span class="hljs-string">warn</span>   <span class="hljs-comment"># logg advarsel, stopp ikke pipelinen</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
    <span class="hljs-attr">tests:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">unique:</span>
          <span class="hljs-attr">severity:</span> <span class="hljs-string">error</span>  <span class="hljs-comment"># stopp pipelinen (standard)</span>
</code></pre>
<ul>
<li><strong><code>error</code></strong> (standard): dbt feiler — downstream-modeller kjøres ikke</li>
<li><strong><code>warn</code></strong>: dbt rapporterer problemet, men fortsetter</li>
</ul>
<blockquote>
<p>Bruk <code>warn</code> for kjente kildesystemfeil du dokumenterer men ikke kan fikse — f.eks. at 5 kunder mangler e-post.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="store_failures"><code>store_failures</code></h2>
<p>Når en test feiler ønsker du ofte å se <em>hvilke rader</em> som feiler, ikke bare at testen feiler.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">columns:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
    <span class="hljs-attr">tests:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">relationships:</span>
          <span class="hljs-attr">to:</span> <span class="hljs-string">ref(&#x27;stg__crm_customers&#x27;)</span>
          <span class="hljs-attr">field:</span> <span class="hljs-string">customer_id</span>
          <span class="hljs-attr">store_failures:</span> <span class="hljs-literal">true</span>
</code></pre>
<p>dbt materialiserer de feilende radene som en tabell i databasen — nyttig for feilsøking og dokumentasjon av kjente datakvalitetsproblemer.</p>
<p>Kan også settes globalt i <code>dbt_project.yml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">tests:</span>
  <span class="hljs-string">+store_failures:</span> <span class="hljs-literal">true</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="singul%C3%A6re-tester">Singulære tester</h2>
<p>En singulær test er en vanlig SQL-fil i <code>data-tests/</code> som returnerer rader som feiler.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- data-tests/assert_invoice_amount_positive.sql</span>
<span class="hljs-keyword">select</span> <span class="hljs-operator">*</span>
<span class="hljs-keyword">from</span> {{ <span class="hljs-keyword">ref</span>(<span class="hljs-string">&#x27;stg__billing_invoices&#x27;</span>) }}
<span class="hljs-keyword">where</span> amount_eur <span class="hljs-operator">&lt;</span> <span class="hljs-number">0</span>
  <span class="hljs-keyword">and</span> status <span class="hljs-operator">!=</span> <span class="hljs-string">&#x27;credited&#x27;</span>
</code></pre>
<p>dbt feiler testen hvis én eller flere rader returneres.</p>
<p>Passer for forretningsregler som ikke lar seg uttrykke med generiske tester — men kan bli mange og vanskelige å vedlikeholde i store prosjekter.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="testing-av-kjente-feil">Testing av kjente feil</h2>
<p>Kildedataene i dette prosjektet har 13 kjente problemer. Tester kan brukes til å <em>dokumentere</em> dem, ikke bare oppdage dem:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">customer_id</span>
  <span class="hljs-attr">tests:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">unique:</span>
        <span class="hljs-attr">severity:</span> <span class="hljs-string">warn</span>
        <span class="hljs-comment"># kjent: C001, C005, C010, C016 har to aktive kontrakter</span>
</code></pre>
<p>To tilnærminger:</p>
<ul>
<li><strong>Ikke test det du vet feiler</strong> — spar testen til kildesystemet er fikset</li>
<li><strong>Test med <code>warn</code></strong> — dokumenterer problemet eksplisitt og varsler hvis det endrer seg</li>
</ul>
<blockquote>
<p>Hva er risikoen ved å ikke teste kjente feil i det hele tatt?</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="televerket" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:televerket;" data-marpit-pagination-total="36">
<h2 id="datasett-tester-i-dette-prosjektet">Datasett: tester i dette prosjektet</h2>
<p>Viktige tester å ha på plass etter session 2:</p>
<table>
<thead>
<tr>
<th>Modell</th>
<th>Kolonne</th>
<th>Test</th>
<th>Merk</th>
</tr>
</thead>
